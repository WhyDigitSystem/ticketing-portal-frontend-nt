<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#2563eb" />
    <meta name="description" content="eBooks" />
    <meta
      name="keywords"
      content="fleet management, logistics, transportation, cargo, vcargo"
    />
    <meta name="author" content="eBooks" />

    <!-- Open Graph / Twitter -->
    <meta property="og:title" content="eBooks - Smart Fleet Management" />
    <meta
      property="og:description"
      content="Efficient logistics and transportation management system"
    />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.png" />
    <meta property="og:url" content="https://vcargo.example.com" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="eBooks" />
    <meta
      name="twitter:description"
      content="Efficient logistics and transportation management system"
    />
    <meta name="twitter:image" content="%PUBLIC_URL%/twitter-image.png" />


    <!-- icon -->
    <link rel="icon" href="/icon.png" type="image/png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
    />

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: "class",
        important: true,
        theme: {
          extend: {
            colors: {
              primary: {
                50: "#eff6ff",
                100: "#dbeafe",
                200: "#bfdbfe",
                300: "#93c5fd",
                400: "#60a5fa",
                500: "#3b82f6",
                600: "#2563eb",
                700: "#1d4ed8",
                800: "#1e40af",
                900: "#1e3a8a",
              },
              secondary: { 500: "#10b981", 600: "#059669", 700: "#047857" },
            },
            fontFamily: {
              sans: [
                "Inter",
                "system-ui",
                "-apple-system",
                "BlinkMacSystemFont",
                "Segoe UI",
                "Roboto",
                "sans-serif",
              ],
            },
            animation: {
              "fade-in": "fadeIn 0.5s ease-in-out",
              "slide-up": "slideUp 0.3s ease-out",
              "pulse-slow": "pulse 3s cubic-bezier(0.4,0,0.6,1) infinite",
            },
            keyframes: {
              fadeIn: { "0%": { opacity: "0" }, "100%": { opacity: "1" } },
              slideUp: {
                "0%": { transform: "translateY(10px)", opacity: "0" },
                "100%": { transform: "translateY(0)", opacity: "1" },
              },
            },
            boxShadow: {
              card: "0 4px 6px -1px rgba(0,0,0,0.1),0 2px 4px -1px rgba(0,0,0,0.06)",
              "card-hover":
                "0 10px 15px -3px rgba(0,0,0,0.1),0 4px 6px -2px rgba(0,0,0,0.05)",
            },
          },
        },
        plugins: [],
      };
    </script>

    <!-- Critical CSS -->
    <style>
      body {
        margin: 0;
        padding: 0;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        text-rendering: optimizeLegibility;
      }
      #root {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .app-loading {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #010516 0%, #160d20 100%);
        z-index: 9999;
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 3px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #fff;
        animation: spin 1s ease-in-out infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>

    <title>Ticketing Portal</title>
  </head>
  <body
    class="bg-gray-50 text-gray-900 dark:bg-gray-900 dark:text-gray-100 transition-colors duration-300"
  >
    <div id="loading" class="app-loading">
      <div class="loading-spinner"></div>
    </div>

    <div id="root"></div>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        // Remove loading screen
        const loading = document.getElementById("loading");
        if (loading) {
          setTimeout(() => {
            loading.style.opacity = "0";
            loading.style.transition = "opacity 0.3s";
            setTimeout(() => loading.remove(), 300);
          }, 500);
        }

        // Service Worker registration (exclude localhost)
        if (
          "serviceWorker" in navigator &&
          !["localhost", "127.0.0.1"].includes(window.location.hostname)
        ) {
          window.addEventListener("load", () => {
            navigator.serviceWorker
              .register("/service-worker.js")
              .then((reg) =>
                console.log("ServiceWorker registered:", reg.scope),
              )
              .catch((err) => console.log("ServiceWorker failed:", err));
          });
        }

        // Dark mode detection
        if (
          localStorage.theme === "dark" ||
          (!("theme" in localStorage) &&
            window.matchMedia("(prefers-color-scheme: dark)").matches)
        ) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      });
    </script>

    <noscript>
      <div
        class="p-8 max-w-2xl mx-auto mt-20 bg-white dark:bg-gray-800 rounded-lg shadow-lg"
      >
        <h1 class="text-2xl font-bold text-red-600 mb-4">
          JavaScript Required
        </h1>
        <p class="text-gray-700 dark:text-gray-300 mb-4">
          Vcargo requires JavaScript to function properly. Please enable
          JavaScript in your browser settings.
        </p>
        <div
          class="bg-yellow-50 dark:bg-yellow-900/20 border-l-4 border-yellow-400 p-4"
        >
          <p class="text-yellow-700 dark:text-yellow-300">
            Update to a modern browser like
            <a href="https://www.google.com/chrome/" class="underline">Chrome</a
            >,
            <a href="https://www.mozilla.org/firefox/" class="underline"
              >Firefox</a
            >, or
            <a href="https://www.microsoft.com/edge" class="underline">Edge</a>.
          </p>
        </div>
      </div>
    </noscript>
  </body>
</html>
